<!DOCTYPE html>
<html>
<head>
<title>Find Yourself</title>
<link rel="stylesheet" href="/fonts/jetbrains-mono.css">
<link rel="stylesheet" href="/cursor.css">
<style>
  html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #000000 !important;
  }
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #000000 !important;
    font-family: 'JetBrains Mono', monospace;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background-color: transparent !important;
  }
</style>
</head>
<body>
  <div id="loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: 'JetBrains Mono', monospace;">
    <div style="color: #888; font-size: 24px; margin-bottom: 20px;">Loading. Please wait...</div>
    <div style="width: 325px; height: 4px; background: #333; border-radius: 2px; overflow: hidden;">
      <div id="loader-bar" style="width: 0%; height: 100%; background: #DC143C; transition: width 0.1s;"></div>
    </div>
  </div>
  <script src="src/index.js" type="module"></script>
</body>
</html>
