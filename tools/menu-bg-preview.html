<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>menu-bg preview</title>
  <style>
    html, body { margin: 0; padding: 0; background: #111; }
    canvas { display: block; width: 100vw; height: auto; image-rendering: pixelated; }
    #wrap { position: relative; }
    #note { position: fixed; left: 8px; bottom: 8px; color: #ddd; font-family: monospace; font-size: 12px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="wrap"></div>
  <div id="note">menu-bg preview · open this URL to view what the ready/menu scenes will use</div>
  <script type="module">
    import { generateMenuBackgroundCanvas } from '/src/utils/menu-bg-generator.js'
    const c = generateMenuBackgroundCanvas()
    document.getElementById('wrap').appendChild(c)
  </script>
</body>
</html>
